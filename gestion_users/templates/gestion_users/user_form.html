<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: #f4f7fc;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
        }

        /* Navbar */

        .navbar{
            background: linear-gradient(90deg,#0d6efd,#0056d6);
            padding: 15px 0;
        }

        .navbar-brand{
            color: white !important;
            font-size: 24px;
            font-weight: bold;
        }

        /* Main Card */

        .form-card{
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            padding: 40px;
            background: white;
        }

        .page-title{
            color: #0d6efd;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle{
            text-align: center;
            color: gray;
            margin-bottom: 35px;
        }

        /* Inputs */

        .form-control{
            height: 50px;
            border-radius: 12px;
            padding-left: 45px;
            border: 1px solid #dcdcdc;
        }

        .form-control:focus{
            border-color: #0d6efd;
            box-shadow: 0 0 10px rgba(13,110,253,0.15);
        }

        .input-group-text{
            border-radius: 12px 0 0 12px;
            background: white;
            border-right: none;
        }

        .input-group .form-control{
            border-left: none;
        }

        /* Buttons */

        .btn-save{
            background: linear-gradient(90deg,#16a34a,#16c35b);
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn-save:hover{
            background: linear-gradient(90deg,#12813b,#12a14a);
        }

        .btn-back{
            border-radius: 12px;
            padding: 12px 25px;
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark shadow">

        <div class="container">

            <a class="navbar-brand" href="/">
                <i class="bi bi-people-fill"></i>
                Users Management
            </a>

        </div>

    </nav>

    <!-- Form -->

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="form-card">

                    <h1 class="page-title">
                        <i class="bi bi-person-circle"></i>
                        User Form
                    </h1>

                    <p class="subtitle">
                        Fill in the details to add or update a user
                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <!-- Name -->

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Name
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>

                                <input type="text"
                                    name="name"
                                    class="form-control"
                                    placeholder="Enter full name"
                                    value="{{ form.name.value|default:'' }}">

                            </div>

                        </div>

                        <!-- Email -->

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Email
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>

                                <input type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="Enter email"
                                    value="{{ form.email.value|default:'' }}">

                            </div>

                        </div>

                        <!-- Age -->

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Age
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-calendar"></i>
                                </span>

                                <input type="number"
                                    name="age"
                                    class="form-control"
                                    placeholder="Enter age"
                                    value="{{ form.age.value|default:'' }}">

                            </div>

                        </div>

                        <!-- Phone -->

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Phone
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-telephone"></i>
                                </span>

                                <input type="text"
                                    name="phone"
                                    class="form-control"
                                    placeholder="Enter phone number"
                                    value="{{ form.phone.value|default:'' }}">

                            </div>

                        </div>

                        <!-- City -->

                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                City
                            </label>

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="bi bi-geo-alt"></i>
                                </span>

                                <input type="text"
                                    name="city"
                                    class="form-control"
                                    placeholder="Enter city"
                                    value="{{ form.city.value|default:'' }}">

                            </div>

                        </div>

                        <!-- Buttons -->

                        <div class="d-flex justify-content-between mt-5">

                            <a href="/"
                                class="btn btn-secondary btn-back">

                                <i class="bi bi-arrow-left"></i>
                                Back

                            </a>

                            <button type="submit"
                                class="btn btn-success btn-save">

                                <i class="bi bi-floppy"></i>
                                Save User

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
